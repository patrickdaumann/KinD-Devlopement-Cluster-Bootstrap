apiVersion: v1
kind: ConfigMap
metadata:
  name: exdns-k8s-gateway
  namespace: default
data:
  Corefile: |
    .:1053 {
      template IN A __INGRESS_BASE_DOMAIN__ {
        match ^(.+)\.__INGRESS_BASE_DOMAIN_REGEX__\.$
        answer "{{ .Name }} 300 IN A __GATEWAY_LB_IP__"
        fallthrough
      }
      template IN AAAA __INGRESS_BASE_DOMAIN__ {
        rcode NOERROR
        fallthrough
      }
      forward . /etc/resolv.conf
      log
      errors
      health
      ready
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exdns-k8s-gateway
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: local-dns
      app.kubernetes.io/instance: exdns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-dns
        app.kubernetes.io/instance: exdns
    spec:
      containers:
        - name: coredns
          image: coredns/coredns:1.11.3
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - name: dns-udp
              containerPort: 1053
              protocol: UDP
            - name: dns-tcp
              containerPort: 1053
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
          readinessProbe:
            httpGet:
              path: /ready
              port: 8181
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
      volumes:
        - name: config
          configMap:
            name: exdns-k8s-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: exdns-k8s-gateway
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: local-dns
    app.kubernetes.io/instance: exdns
  ports:
    - name: dns-udp
      port: 53
      targetPort: 1053
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 1053
      protocol: TCP
