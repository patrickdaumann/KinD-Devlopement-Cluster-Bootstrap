apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  parentRefs:
    - name: local-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - prometheus.__INGRESS_BASE_DOMAIN__
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
